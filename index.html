  z-index: 10;

  overflow: hidden;
  cursor: grab;

#mapa {
  position: absolute;
  top: 0;
  left: 0;
}

#mapa img {
  width: 1000px;
  display: block;
}

/* PUNTOS */
.punto {
  position: absolute;
  width: 20px;
  height: 20px;
  background: gold;
  border-radius: 50%;
  box-shadow: 0 0 20px gold;
  z-index: 3;
  cursor: pointer;
}

/* PANEL */
#panel {
  position: fixed;
  right: 0;
  top: 0;
  width: 320px;
  height: 100%;
  background: rgba(0,0,0,0.92);
  padding: 20px;
  display: none;
  color: white;
  overflow-y: auto;

/* TEXTO */
.fade {
  opacity: 0;
  animation: aparecer 1.5s forwards;
}

@keyframes aparecer {
  to { opacity: 1; }
}

/* PARPADEO */
.parpadeo { animation: blink 1.2s infinite; }
.parpadeo-fuerte { animation: blink 0.4s infinite; }
.parpadeo-raro { animation: blinkRaro 2s infinite; }

@keyframes blink {
  0%,100% { opacity: 1; }
  50% { opacity: 0.2; }
}

@keyframes blinkRaro {
  0%,100% { opacity: 1; }
  10% { opacity: 0; }
  20% { opacity: 1; }
  35% { opacity: 0.3; }
  50% { opacity: 1; }
  70% { opacity: 0; }

/* TOGGLE */
function toggleSeccion(id) {
  const el = document.getElementById(id);
  el.style.display = (el.style.display === "block") ? "none" : "block";
}

/* ZOOM + DRAG */
let escala = 1;
let posX = 0;
let posY = 0;
let arrastrando = false;
let inicioX = 0;
let inicioY = 0;

const contenedor = document.getElementById("contenedor");
const mapa = document.getElementById("mapa");

function actualizar() {
  mapa.style.transform = `translate(${posX}px, ${posY}px) scale(${escala})`;
}

contenedor.addEventListener("wheel", function(e) {
  e.preventDefault();
  escala += (e.deltaY < 0) ? 0.1 : -0.1;
  escala = Math.max(0.5, Math.min(3, escala));
  actualizar();
}, { passive: false });

contenedor.addEventListener("mousedown", function(e) {
  arrastrando = true;
  contenedor.style.cursor = "grabbing";
  inicioX = e.clientX - posX;
  inicioY = e.clientY - posY;
});

window.addEventListener("mousemove", function(e) {
  if (!arrastrando) return;
  posX = e.clientX - inicioX;
  posY = e.clientY - inicioY;
  actualizar();
});

window.addEventListener("mouseup", function() {
  arrastrando = false;
  contenedor.style.cursor = "grab";
});

</script>
